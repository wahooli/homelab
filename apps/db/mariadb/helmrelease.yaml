apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: mariadb
  namespace: flux-system
spec:
  releaseName: mariadb
  targetNamespace: db
  chart:
    spec:
      chart: mariadb
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      # version: ">=10.1.1 <10.6.0"
      version: 16.4.0
  interval: 1h0m0s
  install:
    remediation:
      retries: -1
  values:
    image:
      tag: 11.2.3-debian-12-r4
    architecture: standalone
    auth:
      replicationUser: replicator
      username: maria_adm
      existingSecret: mariadb-password-secret
    diagnosticMode:
      enabled: false
    metrics:
      enabled: false
      serviceMonitor:
        labels:
          app: mariadb
          release: kube-prometheus-stack
        jobLabel: mariadb-metrics
        enabled: false
        namespace: db
    primary:
      persistence:
        enabled: true
        existingClaim: db-mariadb-pvc