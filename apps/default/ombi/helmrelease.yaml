apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ombi
  namespace: flux-system
spec:
  releaseName: ombi
  targetNamespace: default
  chart:
    spec:
      chart: ombi
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
      version: ">=11.1.0"
      interval: 1h
  interval: 15m
  install:
    remediation:
      retries: -1
  values:
    initContainers:
      copy-configuration: 
        image: bash:5.1.12
        imagePullPolicy: IfNotPresent
        command: ['bash', '-c', 'find /src/ -type l ! -name "*..data" -maxdepth 1 | while read -r file; do install -D -m 664 $(readlink -f $file) /dest${file#/src}; done; find /dest -type f -maxdepth 1 -name "*.sh" -exec chmod +x {} \; ; echo copied'] # heccin oneliner
        volumeMounts:
        - name: config
          mountPath: /dest
        - name: configyaml
          mountPath: /src
    image:
      repository: linuxserver/ombi
      tag: 4.22.5
      pullPolicy: IfNotPresent
    env:
      TZ: Europe/Helsinki
    persistence:
      configyaml:
        enabled: true
        type: custom
        volumeSpec:
          configMap:
            name: ombi-database-json
      config:
        enabled: false
        # type: configMap
        # name: ombi-database-json
        # mountpath: /config/database.json
        # readOnly: false
    ingress:
      main:
        enabled: true
        primary: true
        ingressClassName: nginx
        annotations: 
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        hosts: 
        - host: ombi.${dns_suffix:=absolutist.it}
          paths:
            - path: "/"
              pathType: "Prefix"
        - host: ombi.${dns_suffix2:=wahoo.li}
          paths:
            - path: "/"
              pathType: "Prefix"
        tls:
          - secretName: tls-ombi-ingress